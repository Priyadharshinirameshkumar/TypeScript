<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading Hierarchy</title>
</head>

<body>

    <h1>My Portfolio</h1>

    <h2>About Me</h2>

    <p>
        I am a B.Tech Artificial Intelligence and Data Science student
        interested in web development and programming.
    </p>

    <h2>Skills</h2>

    <h3>JavaScript</h3>

    <p>Learning JavaScript fundamentals and building projects.</p>

    <h2>Contact</h2>

    <p>Email: example@email.com</p>

    <!--
    The heading that should directly follow an <h1> is usually an <h2>.

    Headings should follow a logical order (h1 → h2 → h3 → h4...)
    without skipping levels. This improves accessibility for screen
    readers and helps search engines understand the page structure.
    -->

</body>

</html>
